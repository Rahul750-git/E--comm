<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Product Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h3 class="logo"><strong>sneakers</strong></h3>
    <div class="main">
      <nav id="navbar">
        <a href="">Collections</a>
        <a href="">Men</a>
        <a href="">Women</a>
        <a href="">About</a>
        <a href="">Contact</a>
        <img class="nav" src="./images/shoppingicon.png" alt="shoppingicon" srcset="" />
        <img
        class="nav"
          src="https://wallpapercave.com/wp/wp1856106.jpg"
          alt=""
          srcset=""
        />
      </nav>
    </div>
     <div class="middle">
        <img class="shoes" src="./images/shoes (1).png" alt="" srcset="">
        <div class="side">
                    <h3>SNEAKER COMPANY</h3>
          <h1>Fall Limited Edition <br>
          <span>Sneakers</span></h1>
          <p>These low-profile sneakers are your perfect casual wear <br>
          companion. Featuring a durable rubber outer sole, <br>
        they 'll withstand everything the weather can offer.</p>
        </div>

        <div class="price">
          <span>$125.00 </span><span class="dis">50%</span>
        <br>
        <span class="under">$250.00</span>
        <button class="btn">
          <span class="org">+</span>
          <span class="zero">0</span>
          <span class="org">-</span>
        </button>
        <br>
        <button class=" flex h-10  w-30 bg-orange-300 rounded-md">Add to Card</button>
        </div>
      </div>
       <div class="footer">
          <img class="image1" src="./images/shoes (2).png" alt="" srcset="">
          <img class="image2" src="./images/shoes (3).png" alt="" srcset="">
          <img class="image3" src="./images/shoes (4).png" alt="" srcset="">
          <img class="image4" src="./images/shoes (5).png" alt="" srcset="">
          <img class="image5" src="./images/shoes (6).png" alt="" srcset="">
          
        </div>
  </body>
</html>
